# promptfoo eval config for Step 3: Extract Locations
# Evaluates the extract-locations prompt against source fixtures.
# Run: pnpm promptfoo:locations

description: "Extract Locations — location and timespan extraction accuracy"

providers:
  - id: "file://provider.ts"
    config:
      promptFile: "extract-locations.md"
    label: "Gemini (extract-locations)"

prompts:
  - "{{input}}"

defaultTest:
  assert:
    # Every output must conform to ExtractedLocationsSchema
    - type: javascript
      value: "file://assertions.ts:validateExtractLocationsSchema"

tests:
  # Football parking — should have specific address with stadium-area pins
  - vars:
      input: "file://../__mocks__/fixtures/sources/single-simple-message.md"
    assert:
      - type: javascript
        value: "file://assertions.ts:assertWithSpecificAddress"
        config:
          value: "true"
      - type: javascript
        value: "file://assertions.ts:assertHasLocations"

  # Multiple street locations (sidewalk repairs on Oborishte)
  - vars:
      input: "file://../__mocks__/fixtures/sources/single-message-multiple-locations.md"
    assert:
      - type: javascript
        value: "file://assertions.ts:assertWithSpecificAddress"
        config:
          value: "true"
      - type: javascript
        value: "file://assertions.ts:assertHasLocations"

  # Film shooting with timespans — should have specific address
  - vars:
      input: "file://../__mocks__/fixtures/sources/single-message-mutiple-timespans.md"
    assert:
      - type: javascript
        value: "file://assertions.ts:assertWithSpecificAddress"
        config:
          value: "true"
      - type: javascript
        value: "file://assertions.ts:assertHasLocations"

  # Complex single message (bus rerouting + street closure)
  - vars:
      input: "file://../__mocks__/fixtures/sources/complex-single-message.md"
    assert:
      - type: javascript
        value: "file://assertions.ts:assertHasLocations"

  # Complex multi-message
  - vars:
      input: "file://../__mocks__/fixtures/sources/complex-multi-message.md"
    assert:
      - type: javascript
        value: "file://assertions.ts:assertHasLocations"

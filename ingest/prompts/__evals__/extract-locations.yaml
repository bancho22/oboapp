# promptfoo eval config for Step 3: Extract Locations
# Evaluates the extract-locations prompt against source fixtures.
# Run: pnpm promptfoo:locations

description: "Extract Locations — location and timespan extraction accuracy"

providers:
  - id: "file://provider.ts"
    config:
      promptFile: "extract-locations.md"
    label: "Gemini (extract-locations)"

prompts:
  - "{{input}}"

defaultTest:
  assert:
    # Every output must conform to ExtractedLocationsSchema
    - type: javascript
      value: "file://assertions.ts:validateExtractLocationsSchema"

tests:
  # Football parking — should have specific address with stadium-area pins
  - vars:
      input: "file://../../__mocks__/fixtures/sources/single-simple-message.md"
    assert:
      - type: javascript
        value: "file://assertions.ts:assertWithSpecificAddress"
        config:
          value: "true"
      - type: javascript
        value: "file://assertions.ts:assertHasLocations"

  # Multiple street locations (sidewalk repairs on Oborishte)
  - vars:
      input: "file://../../__mocks__/fixtures/sources/single-message-multiple-locations.md"
    assert:
      - type: javascript
        value: "file://assertions.ts:assertWithSpecificAddress"
        config:
          value: "true"
      - type: javascript
        value: "file://assertions.ts:assertHasLocations"

  # Film shooting with timespans — should have specific address
  - vars:
      input: "file://../../__mocks__/fixtures/sources/single-message-mutiple-timespans.md"
    assert:
      - type: javascript
        value: "file://assertions.ts:assertWithSpecificAddress"
        config:
          value: "true"
      - type: javascript
        value: "file://assertions.ts:assertHasLocations"

  # Complex single message (bus rerouting + street closure)
  - vars:
      input: "file://../../__mocks__/fixtures/sources/complex-single-message.md"
    assert:
      - type: javascript
        value: "file://assertions.ts:assertHasLocations"

  # Complex multi-message
  - vars:
      input: "file://../../__mocks__/fixtures/sources/complex-multi-message.md"
    assert:
      - type: javascript
        value: "file://assertions.ts:assertHasLocations"

  # School facility reference — 93 СУ Александър Теодоров – Балан with modular classroom expansion
  - vars:
      input: "file://../../__mocks__/fixtures/sources/school-geocoding.md"
    assert:
      - type: javascript
        value: "file://assertions.ts:assertHasLocations"
      - type: javascript
        value: "file://assertions.ts:assertHasEducationalFacility"
        config:
          value: "school:93"

  # Housing complex blocks (ж.к. Дружба, бл. 66/91/88)
  - vars:
      input: "file://../../__mocks__/fixtures/sources/housing-complex-blocks.md"
    assert:
      - type: javascript
        value: "file://assertions.ts:assertWithSpecificAddress"
        config:
          value: "true"
      - type: javascript
        value: "file://assertions.ts:assertHasLocations"
      - type: javascript
        value: "file://assertions.ts:assertMinPinCount"
        config:
          value: 3
      - type: javascript
        value: |
          (output) => {
            const data = typeof output === 'string' ? JSON.parse(output) : output;
            const pins = Array.isArray(data?.pins) ? data.pins : [];

            const positionalPattern = /(?:^|[\s,.])(до|пред|зад|срещу|при|между)(?:[\s,.]|$)/;
            const normalizedPattern = /^бл\.\s*\d+,\s*ж\.к\. .+/;

            for (const pin of pins) {
              if (!pin || typeof pin.address !== 'string' || !pin.address.trim()) {
                throw new Error('Every pin must have a non-empty address string');
              }

              const addrLower = pin.address.toLowerCase();
              if (positionalPattern.test(addrLower)) {
                throw new Error(
                  `Unnormalized positional wording found in pin address: "${pin.address}"`
                );
              }

              if (!normalizedPattern.test(addrLower)) {
                throw new Error(
                  `Pin address is not normalized as "бл. <n>, ж.к. <name>": "${pin.address}"`
                );
              }
            }

            return true;
          }
